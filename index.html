<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#F4F6F9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0E1117" media="(prefers-color-scheme: dark)">
<title>Reference</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%97%82%EF%B8%8F</text></svg>">
<style>
  :root, :root[data-theme="light"] {
    --ground: #F4F6F9;
    --surface: #FFFFFF;
    --ink: #131720;
    --ink-soft: #596174;
    --ink-faint: #878FA1;
    --rule: #DFE3EB;
    --focus: #1E5FA8;
    --shadow: 0 1px 2px rgba(19,23,32,.06), 0 4px 12px rgba(19,23,32,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #0E1117;
      --surface: #171B24;
      --ink: #EDEFF3;
      --ink-soft: #98A0B2;
      --ink-faint: #6B7385;
      --rule: #2A3140;
      --focus: #6BA6E8;
      --shadow: none;
    }
  }
  :root[data-theme="dark"] {
    --ground: #0E1117;
    --surface: #171B24;
    --ink: #EDEFF3;
    --ink-soft: #98A0B2;
    --ink-faint: #6B7385;
    --rule: #2A3140;
    --focus: #6BA6E8;
    --shadow: none;
  }

  *,*::before,*::after { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ground);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }

  .wrap {
    max-width: 620px;
    margin: 0 auto;
    padding: 40px 18px 64px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  h1 {
    margin: 6px 0 0;
    font-size: clamp(28px, 7vw, 36px);
    line-height: 1.05;
    letter-spacing: -.025em;
    font-weight: 800;
  }

  #theme {
    flex: none;
    width: 38px; height: 38px;
    border-radius: 9px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow);
  }
  #theme:hover { color: var(--ink); }
  #theme:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .list { display: flex; flex-direction: column; gap: 9px; }

  a.item {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 16px 17px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 13px;
    box-shadow: var(--shadow);
  }
  a.item:hover { border-color: var(--focus); }
  a.item:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .glyph { font-size: 22px; line-height: 1; flex: none; }
  .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .meta .name { font-weight: 650; letter-spacing: -.01em; }
  .meta .desc { font-size: 13.5px; color: var(--ink-soft); }
  .chev { margin-left: auto; color: var(--ink-faint); flex: none; }

  footer {
    font-size: 12.5px;
    color: var(--ink-faint);
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="top">
      <div>
        <div class="eyebrow">Personal</div>
        <h1>Reference</h1>
      </div>
      <button id="theme" type="button" aria-label="Switch between light and dark">◐</button>
    </div>
  </header>

  <div class="list">
    <a class="item" href="cards.html">
      <span class="glyph" aria-hidden="true">💳</span>
      <span class="meta">
        <span class="name">Which card do I pull out?</span>
        <span class="desc">Maximize points by category · Q3 2026</span>
      </span>
      <span class="chev" aria-hidden="true">→</span>
    </a>
  </div>

  <footer>Pages get added here as they're built.</footer>

</div>

<script>
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById('theme');
    var saved = null;
    try { saved = localStorage.getItem('cc-theme'); } catch (e) {}
    if (saved === 'light' || saved === 'dark') root.setAttribute('data-theme', saved);
    function current() {
      var a = root.getAttribute('data-theme');
      if (a) return a;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    btn.addEventListener('click', function () {
      var next = current() === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('cc-theme', next); } catch (e) {}
    });
  })();
</script>
</body>
</html>
